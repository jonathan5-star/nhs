<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e1e1e;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 14px;
            width: min(100%, 360px);
            max-width: 420px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        #display {
            width: 100%;
            min-height: 60px;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: right;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #111;
            color: #fff;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            flex: 0 0 calc(20% - 6.4px);
            min-height: 56px;
            padding: 0 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #444;
            color: #fff;
            transition: transform 0.12s ease, background-color 0.12s ease;
            box-sizing: border-box;
        }

        button:hover,
        button:focus {
            background: #666;
            transform: translateY(-0.5px);
        }

        button:active {
            transform: translateY(1px);
        }

        .operator { background: #ff9500; }
        .equal { background: #28a745; flex: 0 0 calc(40% - 6.4px); }
        .clear { background: #dc3545; }

        @media (max-width: 480px) {
            #display { font-size: 22px; min-height: 52px; }
            button { min-height: 48px; font-size: 14px; }
            .calculator { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button id="clear" class="clear">C</button>
            <button id="backspace" class="clear">←</button>
            <button onclick="append('(')">(</button>
            <button onclick="append(')')">)</button>
            <button onclick="append('%')">%</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')" class="operator">×</button>
            <button onclick="append('Math.sqrt(')">√</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('-')" class="operator">−</button>
            <button onclick="append('Math.pow(')">xʸ</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('+')" class="operator">+</button>
            <button onclick="append('Math.log(')">log</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="append('Math.sin(')">sin</button>
            <button onclick="append('Math.cos(')">cos</button>
            <button onclick="append('Math.tan(')">tan</button>

            <button onclick="append('Math.PI')">π</button>
            <button onclick="append('Math.E')">e</button>
            <button onclick="insertFactorial()">n!</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>
    <script>
        const display = document.getElementById('display');

        function append(value) {
            if (display.value === 'Error') display.value = '';
            display.value += value;
        }

        function formatExpression(expr) {
            return expr
                .replace(/×/g, '*')
                .replace(/÷/g, '/')
                .replace(/π/g, 'Math.PI')
                .replace(/\be\b/g, 'Math.E')
                .replace(/%/g, '/100');
        }

        function clearDisplay() {
            display.value = '';
        }

        function backspace() {
            if (display.value === 'Error') {
                display.value = '';
                return;
            }
            display.value = display.value.slice(0, -1);
        }

        document.getElementById('clear').addEventListener('click', clearDisplay);
        document.getElementById('backspace').addEventListener('click', backspace);

        function calculate() {
            if (!display.value) return;

            try {
                const expression = formatExpression(display.value);
                const result = Function('Math', `return ${expression}`)(Math);

                if (typeof result === 'number' && !Number.isFinite(result)) {
                    display.value = 'Error';
                } else {
                    display.value = String(result);
                }
            } catch (err) {
                console.error(err);
                display.value = 'Error';
            }
        }

        function insertFactorial() {
            const value = parseFloat(display.value);
            if (Number.isNaN(value) || value < 0 || !Number.isInteger(value)) {
                display.value = 'Error';
                return;
            }

            let result = 1;
            for (let i = 1; i <= value; i++) result *= i;
            display.value = String(result);
        }
    </script>
</body>
</html>
